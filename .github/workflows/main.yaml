name: Build Percona Operator for MySQL docs (PXC)
on:
  push:
    branches: 
      - main
     
jobs:
  build:
    name: Deploy docs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps: 
      #Pull the latest changes
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # fetch all commits/branches
      #Prepare the env
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.x'
      
      #Configure git
      - name: Configure git
        env:
          ROBOT_TOKEN: ${{ secrets.ROBOT_TOKEN }}
        run: |
          git config --global url."https://percona-platform-robot:${ROBOT_TOKEN}@github.com".insteadOf "https://github.com"
          git config user.name "GitHub Action"
          git config user.email "github-action@users.noreply.github.com"
          git config user.password "${ROBOT_TOKEN}"
          echo "GIT_USER=percona-platform-robot:${ROBOT_TOKEN}" >> $GITHUB_ENV


      #Extract release from YAML
      - name: Extract release from variables
        run: |
          RELEASE=$(grep '^release:' variables.yml | awk '{print $2}' )
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
#          PRUNED_VERSION=$(grep '^pruned_version:' variables.yml | awk '{print $2}' )
#          echo "PRUNED_VERSION"=$"PRUNED_VERSION" >> $GITHUB_ENV

      
      #Set up MkDocs
      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

     
     # Deploy docs
      - name: Deploy docs
        env:
          MKDOCS_GIT_COMMITTERS_APIKEY: ${{ secrets.ROBOT_TOKEN }}
        run: |
          mike deploy $RELEASE -u latest -b publish -p
          mike set-default latest -b publish -p
#          mike delete $PRUNED_VERSION -b publish -p
        